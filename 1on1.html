  return list.map(s => renderSupportLi(doc, m, s, null)).join("");
}

function wireTopicPicker(doc) {
  if (READONLY) return;   // 읽기 전용 모드에서는 chip 클릭 비활성
  const $p = document.getElementById(`topicPicker-${doc}`);
  if (!$p) return;   // Topic 섹션 제거됨 — noop
  $p.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      const m = currentMeeting(doc);
      const pid = btn.dataset.pid;
      const i = m.topic_projects.indexOf(pid);
      if (i >= 0) m.topic_projects.splice(i, 1);
      else m.topic_projects.push(pid);
      markDirty();
      // 부분 다시 렌더 — 토픽 칩만 (cards 는 제거됨)
      const $tp = document.getElementById(`topicPicker-${doc}`);
      if ($tp) { $tp.innerHTML = renderTopicPicker(doc, m); wireTopicPicker(doc); }
    });
  });
}

function wireTopicCards(doc) {
  if (READONLY) return;
  const $c = document.getElementById(`topicCards-${doc}`);
  if (!$c) return;   // Topic 섹션 제거됨 — noop
  $c.querySelectorAll("[data-act]").forEach(el => {
    const evt = (el.tagName === "INPUT" && el.type === "text") ? "input"
              : (el.tagName === "INPUT" && el.type === "checkbox") ? "change"
              : (el.tagName === "SELECT") ? "change"
              : "click";
    el.addEventListener(evt, ev => {
      const m = currentMeeting(doc);
      const pid = el.dataset.pid;
      const sid = el.dataset.sid;
      const act = el.dataset.act;
      const p = pid ? getProject(doc, pid) : null;
      if (act === "proj-name")   { p.name = el.value; markDirty(); renderBoard(doc); }
      else if (act === "proj-status") { p.status = el.value; markDirty(); renderBoard(doc); document.getElementById(`topicPicker-${doc}`).innerHTML = renderTopicPicker(doc, m); wireTopicPicker(doc); }
      else if (act === "proj-prio")   { p.priority = el.value; markDirty(); renderBoard(doc); }
      else if (act === "proj-mood")   { p.mood = el.value; markDirty(); renderBoard(doc); }
      else if (act === "proj-detach") {
        const i = m.topic_projects.indexOf(pid);
        if (i>=0) m.topic_projects.splice(i,1);
        markDirty();
        document.getElementById(`topicPicker-${doc}`).innerHTML = renderTopicPicker(doc, m);
        document.getElementById(`topicCards-${doc}`).innerHTML = renderTopicCards(doc, m);
        wireTopicPicker(doc); wireTopicCards(doc);
      }
      else if (act === "add-learning") {
        if (ev.type === "keydown" || (ev.key === "Enter") || ev.type === "blur") return; // wait Enter
        // handled below by 'keydown' listener
      }
      else if (act === "del-learning") {
        const i = parseInt(el.dataset.i);
        p.learnings.splice(i, 1);
        markDirty();
        document.getElementById(`topicCards-${doc}`).innerHTML = renderTopicCards(doc, m);
        wireTopicCards(doc);
        renderBoard(doc);
      }
      else if (act === "topic-learning-date") {
        const i = parseInt(el.dataset.i);
        if (p.learnings[i]) { p.learnings[i].date = el.value; markDirty(); renderBoard(doc); }
      }
      // topic-learning-text 는 click 으로 진입하지 않고 별도 keydown/blur 리스너로 처리 (아래)
      else if (act === "add-proj-support") {
        m.support = m.support || [];
        m.support.push(newSupport(pid));
        markDirty();
        document.getElementById(`topicCards-${doc}`).innerHTML = renderTopicCards(doc, m);
        wireTopicCards(doc);
        renderBoard(doc);
      }
      else if (act === "sup-rev")  { const s = m.support.find(s => s.id === sid); if(s){ s.reviewed = el.checked; markDirty(); } }
      else if (act === "sup-type") { const s = m.support.find(s => s.id === sid); if(s){ s.type = el.value; markDirty(); } }
      else if (act === "sup-need") { const s = m.support.find(s => s.id === sid); if(s){ s.need = el.value; markDirty(); } }
      else if (act === "sup-del")  {
        m.support = (m.support||[]).filter(s => s.id !== sid);
        markDirty();
        document.getElementById(`topicCards-${doc}`).innerHTML = renderTopicCards(doc, m);
        wireTopicCards(doc);
        renderBoard(doc);
      }
    });
  });
  // topic-learning-text — contenteditable 텍스트 편집 (Enter/blur 저장, Esc 취소)
  $c.querySelectorAll("[data-act=topic-learning-text]").forEach(span => {
    const pid = span.dataset.pid;
    const i = parseInt(span.dataset.i);
    const p = getProject(doc, pid);
    if (!p?.learnings?.[i]) return;
    const commit = () => {
      const v = span.innerText.trim();
      if (v !== (p.learnings[i].text||"")) { p.learnings[i].text = v; markDirty(); renderBoard(doc); }
    };
    span.addEventListener("blur", commit);
    span.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); span.blur(); }
      if (e.key === "Escape") { span.innerText = p.learnings[i].text||""; span.blur(); }
    });
  });
  // add-learning Enter 처리
  $c.querySelectorAll("[data-act=add-learning]").forEach(inp => {
    inp.addEventListener("keydown", ev => {
      if (ev.key !== "Enter") return;
      const v = inp.value.trim();
      if (!v) return;
      const m = currentMeeting(doc);
      const pid = inp.dataset.pid;
      const p = getProject(doc, pid);
      p.learnings.push({ date: todayStr(), text: v, meeting_id: m.id });
      inp.value = "";
      markDirty();
      document.getElementById(`topicCards-${doc}`).innerHTML = renderTopicCards(doc, m);
      wireTopicCards(doc);
      renderBoard(doc);
    });
  });
}

function wireGeneralSupports(doc) {
  if (READONLY) return;
  const $u = document.getElementById(`generalSupport-${doc}`);
  $u.querySelectorAll("[data-act]").forEach(el => {
    const evt = (el.tagName === "INPUT" && el.type === "text") ? "input"
              : (el.tagName === "INPUT" && el.type === "checkbox") ? "change"
              : (el.tagName === "SELECT") ? "change"
              : "click";
    el.addEventListener(evt, () => {
      const m = currentMeeting(doc);
      const sid = el.dataset.sid;
      const act = el.dataset.act;
      const s = (m.support||[]).find(s => s.id === sid);
      if (!s) return;
      if (act === "sup-rev")  s.reviewed = el.checked;
      else if (act === "sup-type") s.type = el.value;
      else if (act === "sup-need") s.need = el.value;
      else if (act === "sup-del") {
        m.support = (m.support||[]).filter(x => x.id !== sid);
        markDirty();
        document.getElementById(`generalSupport-${doc}`).innerHTML = renderGeneralSupports(doc, m);
        wireGeneralSupports(doc); return;
      }
      markDirty();
    });
  });
}

function handleSectionAction(doc, act) {
  const notes = getNotes(doc);
  if (act === "new-meeting") {
    notes.push(newMeeting());
    currentIdx[doc] = notes.length - 1;
    markDirty();
    renderMeeting(doc); renderFollowup(doc); renderHistory(doc);
  } else if (act === "del-meeting") {
    if (!confirm("현재 면담 회차를 삭제할까요?")) return;
    const i = currentIdx[doc] ?? notes.length-1;
    notes.splice(i,1);
    if (notes.length === 0) notes.push(newMeeting());
    currentIdx[doc] = notes.length-1;
    markDirty();
    renderMeeting(doc); renderFollowup(doc); renderHistory(doc);
  } else if (act === "add-general-support") {
    const m = currentMeeting(doc);
    m.support = m.support || [];
    m.support.push(newSupport(null));
    markDirty();
    document.getElementById(`generalSupport-${doc}`).innerHTML = renderGeneralSupports(doc, m);
    wireGeneralSupports(doc);
  } else if (act === "add-project") {
    const projects = getProjects(doc);
    const p = newProject();
    p.status = "Inbox";
    projects.push(p);
    markDirty();
    renderBoard(doc); renderMeeting(doc);
  }
}

// ───── 카드 펼침 영역 인라인 편집 핸들러 ─────
function wireCardExpanded(doc, pid, $root) {
  if (READONLY || !$root) return;
  const p = getProject(doc, pid);
  if (!p) return;
  const notes = getNotes(doc);
  const refresh = () => {
    $root.innerHTML = renderCardExpanded(doc, p);
    wireCardExpanded(doc, pid, $root);
    renderBoard(doc);
  };

  // 상태 셀렉트
  const $st = $root.querySelector("[data-act=cx-status]");
  if ($st) $st.addEventListener("change", () => {
    p.status = $st.value; markDirty();
    const m = currentMeeting(doc);
    renderBoard(doc);
    if (m) {
      const $tp = document.getElementById(`topicPicker-${doc}`);
      if ($tp) { $tp.innerHTML = renderTopicPicker(doc, m); wireTopicPicker(doc); }
    }
  });

  // 시작일·종료일·+12주
  const $startD = $root.querySelector("[data-act=cx-start]");
  const $endD   = $root.querySelector("[data-act=cx-end]");
  const $end12w = $root.querySelector("[data-act=cx-end-12w]");
  if ($startD) $startD.addEventListener("change", () => { p.start_date = $startD.value; markDirty(); renderBoard(doc); });
  if ($endD)   $endD.addEventListener("change",   () => { p.end_date   = $endD.value;   markDirty(); renderBoard(doc); });
  if ($end12w) $end12w.addEventListener("click",  () => {
    if (!p.start_date) { alert("먼저 시작일을 설정하세요."); return; }
    p.end_date = addDays(p.start_date, 84);   // 12주 = 84일
    markDirty(); refresh();
  });

  // 🎯 목표 / 📐 지표
  const $goal   = $root.querySelector("[data-act=cx-goal]");
  const $metric = $root.querySelector("[data-act=cx-metric]");
  if ($goal)   $goal.addEventListener("input",   () => { p.goal   = $goal.value;   markDirty(); });
  if ($metric) $metric.addEventListener("input", () => { p.metric = $metric.value; markDirty(); });

  // ⚡ Tactics — 각 항목 토글/주차변경/텍스트편집/삭제
  $root.querySelectorAll("li.tactic-item[data-tid]").forEach(li => {
    const tid = li.dataset.tid;
    const t = (p.tactics||[]).find(x => x.id === tid);
    if (!t) return;
    const $done = li.querySelector("[data-act=cx-tac-done]");
    const $week = li.querySelector("[data-act=cx-tac-week]");
    const $text = li.querySelector("[data-act=cx-tac-text]");
    const $del  = li.querySelector("[data-act=cx-tac-del]");
    if ($done) $done.addEventListener("change", () => {
      t.done = $done.checked;
      t.done_date = t.done ? todayStr() : "";
      markDirty(); renderBoard(doc); refresh();
    });
    if ($week) $week.addEventListener("change", () => {
      t.week = parseInt($week.value, 10) || 0;
      markDirty(); refresh();
    });
    if ($text) {
      const commit = () => {
        const v = $text.innerText.trim();
        if (v !== (t.text||"")) { t.text = v; markDirty(); }
      };
      $text.addEventListener("blur", commit);
      $text.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); $text.blur(); }
        if (e.key === "Escape") { $text.innerText = t.text||""; $text.blur(); }
      });
    }
    if ($del) $del.addEventListener("click", () => {
      if (!confirm("이 주간 액션을 삭제할까요?")) return;
      p.tactics = (p.tactics||[]).filter(x => x.id !== tid);
      markDirty(); renderBoard(doc); refresh();
    });
  });
  // Tactic 추가
  const $newTW = $root.querySelector("[data-act=cx-tac-new-week]");
  const $newTT = $root.querySelector("[data-act=cx-tac-new-text]");
  const $addT  = $root.querySelector("[data-act=cx-tac-add]");
  const addTac = () => {
    const v = ($newTT?.value || "").trim();
    if (!v) return;
    const w = parseInt($newTW?.value || "0", 10) || 0;
    p.tactics = p.tactics || [];
    p.tactics.push({ id: "t_"+Math.random().toString(16).slice(2,10),
                     week: w, text: v, done: false, done_date: "" });
    markDirty(); renderBoard(doc); refresh();
  };
  if ($addT)  $addT.addEventListener("click", addTac);
  if ($newTT) $newTT.addEventListener("keydown", e => { if (e.key==="Enter") { e.preventDefault(); addTac(); } });

  // 인사이트 — 각 항목 편집/삭제
  $root.querySelectorAll("li[data-idx]").forEach(li => {
    const i = parseInt(li.dataset.idx);
    const target = p.learnings[i];
    if (!target) return;
    const $d = li.querySelector("[data-act=cx-learn-date]");
    const $t = li.querySelector("[data-act=cx-learn-text]");
    const $x = li.querySelector("[data-act=cx-learn-del]");
    if ($d) $d.addEventListener("change", () => { target.date = $d.value; markDirty(); renderBoard(doc); });
    if ($t) {
      const commit = () => {
        const v = $t.innerText.trim();
        if (v !== (target.text||"")) { target.text = v; markDirty(); renderBoard(doc); }
      };
      $t.addEventListener("blur", commit);
      $t.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); $t.blur(); }
        if (e.key === "Escape") { $t.innerText = target.text||""; $t.blur(); }
      });
    }
    if ($x) $x.addEventListener("click", () => {
      if (!confirm("이 인사이트 정리를 삭제할까요?")) return;
      p.learnings.splice(i, 1); markDirty(); refresh();
    });
  });
  // 인사이트 — 추가
  const $newLD = $root.querySelector("[data-act=cx-learn-new-date]");
  const $newLT = $root.querySelector("[data-act=cx-learn-new-text]");
  const $addL  = $root.querySelector("[data-act=cx-learn-add]");
  const addLearn = () => {
    const v = ($newLT?.value || "").trim();
    if (!v) return;
    p.learnings.push({ date: $newLD?.value || todayStr(), text: v, meeting_id: null });
    markDirty(); refresh();
  };
  if ($addL)  $addL.addEventListener("click", addLearn);
  if ($newLT) $newLT.addEventListener("keydown", e => { if (e.key==="Enter") { e.preventDefault(); addLearn(); } });

  // Support — 각 항목 편집/삭제
  $root.querySelectorAll("li[data-sid]").forEach(li => {
    const sid = li.dataset.sid;
    const mid = li.dataset.mid;
    const meeting = notes.find(n => n.id === mid);
    const s = meeting?.support?.find(x => x.id === sid);
    if (!s) return;
    const $rev  = li.querySelector("[data-act=cx-sup-rev]");
    const $type = li.querySelector("[data-act=cx-sup-type]");
    const $need = li.querySelector("[data-act=cx-sup-need]");
    const $del  = li.querySelector("[data-act=cx-sup-del]");
    if ($rev)  $rev.addEventListener("change",  () => { s.reviewed = $rev.checked; markDirty(); });
    if ($type) $type.addEventListener("change", () => { s.type     = $type.value;  markDirty(); });
    if ($need) $need.addEventListener("input",  () => { s.need     = $need.value;  markDirty(); });
    if ($del)  $del.addEventListener("click",   () => {
      if (!confirm("이 Support 를 삭제할까요?")) return;
      meeting.support = (meeting.support||[]).filter(x => x.id !== sid);
      markDirty(); renderMeeting(doc); refresh();
    });
  });
  // Support — 추가 (현재 진행 중 면담에 묶음)
  const $newST = $root.querySelector("[data-act=cx-sup-new-type]");
  const $newSN = $root.querySelector("[data-act=cx-sup-new-need]");
  const $addS  = $root.querySelector("[data-act=cx-sup-add]");
  const addSup = () => {
    const v = ($newSN?.value || "").trim();
    if (!v) return;
    const m = currentMeeting(doc);
    if (!m) { alert("면담이 없어 Support 를 추가할 수 없습니다. 먼저 '+ 새 면담' 으로 회차를 만드세요."); return; }
    m.support = m.support || [];
    m.support.push({ id:"s_"+Math.random().toString(16).slice(2,10),
      type: $newST?.value || "Help", need: v, reviewed:false, project_id: pid });
    markDirty(); renderMeeting(doc); refresh();
  };
  if ($addS)  $addS.addEventListener("click", addSup);
  if ($newSN) $newSN.addEventListener("keydown", e => { if (e.key==="Enter") { e.preventDefault(); addSup(); } });

  // 다뤄진 면담 — 날짜/Mood/완료/이동
  $root.querySelectorAll("li[data-mid]:not([data-sid])").forEach(li => {
    const mid = li.dataset.mid;
    const meeting = notes.find(n => n.id === mid);
    if (!meeting) return;
    const $d = li.querySelector("[data-act=cx-mmt-date]");
    const $m = li.querySelector("[data-act=cx-mmt-mood]");
    const $x = li.querySelector("[data-act=cx-mmt-done]");
    const $g = li.querySelector("[data-act=cx-mmt-goto]");
    if ($d) $d.addEventListener("change", () => { meeting.date = $d.value; meeting.month = ($d.value||"").slice(0,7); markDirty(); renderMeeting(doc); });
    if ($m) $m.addEventListener("change", () => { meeting.mood = $m.value; markDirty(); renderMeeting(doc); });
    if ($x) $x.addEventListener("change", () => { meeting.done = $x.checked; markDirty(); renderMeeting(doc); });
    if ($g) $g.addEventListener("click", () => {
      const i = notes.findIndex(n => n.id === mid);
      if (i >= 0) { currentIdx[doc] = i; renderMeeting(doc); renderFollowup(doc); renderHistory(doc); }
      window.scrollTo({ top: document.getElementById(`meeting-${doc}`).offsetTop - 20, behavior:"smooth" });
    });
  });

  // 프로젝트 삭제
  const $delProj = $root.querySelector("[data-act=cx-del-proj]");
  if ($delProj) $delProj.addEventListener("click", () => {
    if (!confirm(`프로젝트 "${p.name}" 를 삭제할까요? 관련 인사이트·Support 도 함께 삭제됩니다.`)) return;
    const arr = getProjects(doc);
    const i = arr.findIndex(x => x.id === pid);
    if (i >= 0) arr.splice(i, 1);
    notes.forEach(m => {
      if (m.topic_projects) m.topic_projects = m.topic_projects.filter(x => x !== pid);
      if (m.support) m.support.forEach(s => { if (s.project_id === pid) s.project_id = null; });
    });
    markDirty(); renderBoard(doc); renderMeeting(doc);
  });
}

// ───── Section C: Project Board (Kanban) ─────
function renderBoard(doc) {
  const projects = getProjects(doc);
  const cols = { "Inbox": [], "In Progress": [], "Done": [] };
  projects.forEach(p => {
    (cols[p.status] || cols["Inbox"]).push(p);
  });

  const $sec = document.getElementById(`board-${doc}`);
  $sec.innerHTML = `
    <h2>📋 프로젝트 보드 <span class="badge">${projects.length}건</span>
      <span class="hint">${READONLY ? "카드 클릭으로 전체 history 보기" : "카드를 다른 칸으로 드래그해 상태 변경 · 클릭은 history 보기"}</span></h2>
    <div class="kanban">
      ${renderKanbanCol(doc, "Inbox", "📥 Inbox", "inbox", cols["Inbox"])}
      ${renderKanbanCol(doc, "In Progress", "🚀 In Progress", "prog", cols["In Progress"])}
      ${renderKanbanCol(doc, "Done", "✅ Done", "done", cols["Done"])}
    </div>
  `;
  // 클릭 → 모달. 단, 드래그 직후의 click 이벤트는 무시 (move-then-modal 방지)
  let suppressClickUntil = 0;
  $sec.querySelectorAll(".kanban-card").forEach(card => {
    card.addEventListener("click", (e) => {
      if (Date.now() < suppressClickUntil) return;
      // 인라인 편집 컨트롤·name 영역·펼침 영역 클릭 시엔 모달 열지 않음
      if (e.target.closest("[data-act]")) return;
      if (e.target.closest(".card-expanded")) return;
      openProjectModal(doc, card.dataset.pid);
    });
  });

  if (!READONLY) {
    // ── 카드 인라인 편집: name(contenteditable) / priority(select) / mood(select) ──
    $sec.querySelectorAll(".kanban-card").forEach(card => {
      const pid = card.dataset.pid;
      const $name = card.querySelector("[data-act=card-name]");
      const $prio = card.querySelector("[data-act=card-prio]");
      const $mood = card.querySelector("[data-act=card-mood]");

      if ($name) {
        // 편집 중에는 카드가 드래그되지 않도록
        $name.addEventListener("focus", () => { card.draggable = false; });
        $name.addEventListener("blur",  () => {
          card.draggable = true;
          const v = $name.innerText.trim();
          const p = getProject(doc, pid);
          if (p && v !== (p.name||"")) { p.name = v; markDirty(); renderBoard(doc); renderMeeting(doc); }
        });
        $name.addEventListener("keydown", e => {
          if (e.key === "Enter") { e.preventDefault(); $name.blur(); }
          if (e.key === "Escape") { const p = getProject(doc, pid); $name.innerText = p?.name||""; $name.blur(); }
        });
        // 클릭 자체는 모달 열지 않도록 (이미 closest 처리되지만 안전망)
        $name.addEventListener("click", e => e.stopPropagation());
      }
      if ($prio) {
        // select 자체가 드래그 핸들과 충돌하지 않도록 mousedown 시 카드 드래그 끄기
        $prio.addEventListener("mousedown", () => { card.draggable = false; });
        $prio.addEventListener("blur",      () => { card.draggable = true; });
        $prio.addEventListener("change", (e) => {
          e.stopPropagation();
          const p = getProject(doc, pid);
          if (!p) return;
          p.priority = $prio.value; markDirty(); renderBoard(doc); renderMeeting(doc);
        });
        $prio.addEventListener("click", e => e.stopPropagation());
      }
      if ($mood) {
        $mood.addEventListener("mousedown", () => { card.draggable = false; });
        $mood.addEventListener("blur",      () => { card.draggable = true; });
        $mood.addEventListener("change", (e) => {
          e.stopPropagation();
          const p = getProject(doc, pid);
          if (!p) return;
          p.mood = $mood.value; markDirty(); renderBoard(doc); renderMeeting(doc);
        });
        $mood.addEventListener("click", e => e.stopPropagation());
      }

      // ── 펼침 영역 토글 + 인라인 인사이트·Support·면담 편집 ──
      const $toggle = card.querySelector("[data-act=card-toggle]");
      const $expanded = card.querySelector(".card-expanded");
      if ($toggle && $expanded) {
        $toggle.addEventListener("click", (e) => {
          e.stopPropagation();
          const willOpen = $expanded.hidden;
          $expanded.hidden = !willOpen;
          $toggle.textContent = willOpen ? "▲ 접기" : "▼ 자세히 (인사이트·Support·면담)";
          if (willOpen) wireCardExpanded(doc, pid, $expanded);
        });
        $expanded.addEventListener("click", e => e.stopPropagation());
      }
    });

    // ── 드래그&드롭으로 상태 변경 ──
    $sec.querySelectorAll(".kanban-card").forEach(card => {
      card.addEventListener("dragstart", (e) => {
        // 인라인 컨트롤에서 시작한 드래그는 무시
        if (e.target.closest("[data-act]")) { e.preventDefault(); return; }
        e.dataTransfer.effectAllowed = "move";
        e.dataTransfer.setData("text/plain", card.dataset.pid);
        card.classList.add("dragging");
      });
      card.addEventListener("dragend", () => {
        card.classList.remove("dragging");
        suppressClickUntil = Date.now() + 250;   // 드래그 종료 직후 click 차단
      });
    });
    $sec.querySelectorAll(".kanban-col").forEach(col => {
      col.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = "move";
        col.classList.add("drop-target");
      });
      col.addEventListener("dragleave", (e) => {
        if (!col.contains(e.relatedTarget)) col.classList.remove("drop-target");
      });
      col.addEventListener("drop", (e) => {
        e.preventDefault();
        col.classList.remove("drop-target");
        const pid = e.dataTransfer.getData("text/plain");
        const newStatus = col.dataset.status;
        if (!pid || !newStatus) return;
        const p = getProject(doc, pid);
        if (!p || p.status === newStatus) return;
        p.status = newStatus;
        markDirty();
        renderBoard(doc);
        // 토픽 칩 표시(Done 흐림 처리 등) 갱신
        const m = currentMeeting(doc);
        if (m) {
          const $tp = document.getElementById(`topicPicker-${doc}`);
          if ($tp) { $tp.innerHTML = renderTopicPicker(doc, m); wireTopicPicker(doc); }
        }
      });
    });

    $sec.querySelectorAll(".add-card-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const projects = getProjects(doc);
        const p = newProject();
        p.status = btn.dataset.status;
        projects.push(p);
        markDirty();
        renderBoard(doc); renderMeeting(doc);
        // 새 카드 모달로 바로
        openProjectModal(doc, p.id);
      });
    });
  }
}

function renderKanbanCol(doc, status, title, cls, projects) {
  const cards = projects.length === 0
    ? `<div class="kanban-empty">— 없음 —</div>`
    : projects.map(p => renderKanbanCard(doc, p)).join("");
  const addBtn = READONLY ? '' :
    `<button class="add-card-btn" data-status="${status}">+ 새 프로젝트</button>`;
  return `
    <div class="kanban-col" data-status="${status}">
      <div class="kanban-col-header ${cls}">${title} <span>${projects.length}</span></div>
      <div class="kanban-cards">${cards}</div>
      ${addBtn}
    </div>`;
}

function renderKanbanCard(doc, p) {
  const recent = (p.learnings||[]).slice(-1)[0];
  const recentHtml = recent
    ? `<div class="recent">💡 ${escapeHtml(recent.text)}</div>` : "";
  const dragAttr = READONLY ? '' : 'draggable="true"';

  // 일정·진행 표시 + 액션 달성률
  const prog = projectProgress(p);
  const tStats = tacticStats(p);
  const scheduleHtml = (p.start_date || p.end_date || tStats)
    ? `<div class="card-schedule">
         ${(p.start_date || p.end_date)
            ? `<span class="sched-range">📅 ${shortDate(p.start_date)} → ${shortDate(p.end_date)}</span>` : ''}
         ${prog ? `<span class="week-tag ${prog.state}">${prog.text}</span>` : ''}
         ${tStats ? `<span class="tactic-tag ${tStats.pct>=85?'active':tStats.pct>=50?'near':'pending'}">⚡ ${tStats.done}/${tStats.total} · ${tStats.pct}%</span>` : ''}
         ${prog && prog.pct !== null ? `<div class="card-progress"><div class="card-progress-fill ${prog.state}" style="width:${prog.pct}%"></div></div>` : ''}
       </div>` : '';

  // 편집 모드: name·priority·mood 인라인 컨트롤. 읽기 전용은 단순 표시.
  if (READONLY) {
    return `
      <div class="kanban-card ${priorityClass(p.priority)}" data-pid="${p.id}">
        <div class="name">${escapeHtml(p.name || "(이름 없음)")}</div>
        <div class="meta">
          <span class="pill ${(p.priority||"mid").toLowerCase()}">${p.priority||"Mid"}</span>
          ${p.mood ? `<span>${p.mood}</span>` : ''}
          <span style="margin-left:auto;">💡 ${(p.learnings||[]).length} · S ${countSupportsForProject(doc, p.id)}</span>
        </div>
        ${scheduleHtml}
        ${recentHtml}
      </div>`;
  }
  const prioOpts = ["High","Mid","Low"].map(v =>
    `<option value="${v}" ${p.priority===v?"selected":""}>${v}</option>`).join("");
  const moodOpts = [["","—"],["😎","😎"],["😀","😀"],["😇","😇"]].map(([v,t]) =>
    `<option value="${v}" ${p.mood===v?"selected":""}>${t}</option>`).join("");
  return `
    <div class="kanban-card ${priorityClass(p.priority)}" data-pid="${p.id}" ${dragAttr}>
      <div class="name" data-act="card-name" contenteditable="true"
           spellcheck="false" title="클릭해서 이름 수정">${escapeHtml(p.name || "(이름 없음)")}</div>
      <div class="meta">
        <select class="card-prio-select ${(p.priority||"mid").toLowerCase()}"
                data-act="card-prio" title="우선순위 변경">${prioOpts}</select>
        <select class="card-mood-select" data-act="card-mood" title="Mood 변경">${moodOpts}</select>
        <span style="margin-left:auto;">💡 ${(p.learnings||[]).length} · S ${countSupportsForProject(doc, p.id)}</span>
      </div>
      ${scheduleHtml}
      ${recentHtml}
      <button class="card-expand-btn" data-act="card-toggle">▼ 자세히 (인사이트·Support·면담)</button>
      <div class="card-expanded" hidden>${renderCardExpanded(doc, p)}</div>
    </div>`;
}

// 카드 펼침 영역 — 인사이트·Support·면담을 모두 인라인으로 편집
function renderCardExpanded(doc, p) {
  const notes = getNotes(doc);
  const allSupports = [];
  const touchingMeetings = [];
  notes.forEach(m => {
    // "다뤄진 면담" 자동 추론: 토픽 마킹 / Support 묶임 / 인사이트가 이 회차에서 추가됨 중 하나라도
    const hasTopic    = m.topic_projects?.includes(p.id);
    const hasSupport  = (m.support||[]).some(s => s.project_id === p.id);
    const hasLearning = (p.learnings||[]).some(l => l.meeting_id === m.id);
    if (hasTopic || hasSupport || hasLearning) touchingMeetings.push(m);
    (m.support||[]).forEach(s => {
      if (s.project_id === p.id) allSupports.push({...s, _meetingDate: m.date, _meetingId: m.id});
    });
  });
  const learnings = (p.learnings||[]).map((l, i) => ({...l, _origIdx: i}))
    .slice().sort((a,b) => (a.date||"").localeCompare(b.date||""));

  const learningsHtml = `
    <ul class="learnings-list">
      ${learnings.length === 0
        ? `<li class="meta" style="border:none;">아직 누적된 인사이트 정리 없음.</li>`
        : learnings.map(l => `
          <li data-idx="${l._origIdx}">
            <input type="date" class="learning-date-edit" data-act="cx-learn-date" value="${l.date||""}">
            <span class="learning-text" data-act="cx-learn-text" contenteditable="true" spellcheck="false">${escapeHtml(l.text||"")}</span>
            <button class="del-mini" data-act="cx-learn-del" title="삭제">✕</button>
          </li>`).join("")}
    </ul>
    <div class="modal-add-learning">
      <input type="date" data-act="cx-learn-new-date" value="${todayStr()}">
      <input type="text" data-act="cx-learn-new-text" placeholder="새 인사이트 정리 (Enter)">
      <button class="add-btn" data-act="cx-learn-add" style="margin-top:0;">+ 추가</button>
    </div>
  `;

  const typeVals = ["Alignment","Decision","Help"];
  const supsHtml = `
    <ul class="item-list">
      ${allSupports.length === 0
        ? `<li class="meta" style="border:none;">관련 Support 없음.</li>`
        : allSupports.map(s => {
            const tOpts = typeVals.map(v => `<option value="${v}" ${s.type===v?"selected":""}>${supLabel(v)}</option>`).join("");
            return `<li data-sid="${s.id}" data-mid="${s._meetingId}">
              <input type="checkbox" data-act="cx-sup-rev" ${s.reviewed?"checked":""}>
              <span class="meta" style="min-width:90px;">${s._meetingDate}</span>
              <select data-act="cx-sup-type" class="type-select">${tOpts}</select>
              <input type="text" data-act="cx-sup-need" value="${escapeHtml(s.need||"")}" placeholder="필요한 지원 사항" style="flex:1; background:var(--panel3); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:4px 8px; font-size:13px;">
              <button class="del-mini" data-act="cx-sup-del">✕</button>
            </li>`;
          }).join("")}
    </ul>
    <div class="modal-add-support">
      <select data-act="cx-sup-new-type">${typeVals.map(v => `<option value="${v}">${supLabel(v)}</option>`).join("")}</select>
      <input type="text" data-act="cx-sup-new-need" placeholder="새 Support (Enter — 진행 중 면담에 추가)">
      <button class="add-btn" data-act="cx-sup-add" style="margin-top:0;">+ 추가</button>
    </div>
  `;

  const moodOptionsM = [["","—"],["😎","😎"],["😀","😀"],["😇","😇"]];
  const meetingsHtml = touchingMeetings.length === 0
    ? `<div class="meta" style="padding:8px;">이 프로젝트를 다룬 면담 없음.</div>`
    : `<ul class="item-list">${touchingMeetings.map(m => {
        const moodOpts = moodOptionsM.map(([v,t]) => `<option value="${v}" ${m.mood===v?"selected":""}>${t}</option>`).join("");
        return `<li data-mid="${m.id}">
          <input type="date" data-act="cx-mmt-date" value="${m.date||""}" style="background:var(--panel3); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:3px 6px; font-size:12px;">
          <select data-act="cx-mmt-mood" style="background:var(--panel3); color:var(--text); border:1px solid var(--border); border-radius:4px; padding:3px 6px;">${moodOpts}</select>
          <label style="display:inline-flex; align-items:center; gap:4px; font-size:12px; color:var(--muted);">
            <input type="checkbox" data-act="cx-mmt-done" ${m.done?"checked":""}> 완료
          </label>
          <button class="add-btn" data-act="cx-mmt-goto" style="margin-top:0; font-size:11px; padding:4px 10px;">↗ 이동</button>
        </li>`;
      }).join("")}</ul>`;

  const statusOpts = ["Inbox","In Progress","Done"].map(v =>
    `<option value="${v}" ${p.status===v?"selected":""}>${v}</option>`).join("");

  // 12주 계획법: 목표·지표·주간 액션
  const curWk = currentWeekNum(p);
  const tStats = tacticStats(p);
  const goalMetricHtml = `
    <div class="card-section goal-metric">
      <label class="goal-row">
        <span class="goal-label">🎯 12주 목표</span>
        <input type="text" data-act="cx-goal" value="${escapeHtml(p.goal||"")}"
          placeholder="이번 12주 동안 도달할 지점 (예: NPS 7.8 → 8.5, 부원장 1명 채용)">
      </label>
      <label class="goal-row">
        <span class="goal-label">📐 측정 지표</span>
        <input type="text" data-act="cx-metric" value="${escapeHtml(p.metric||"")}"
          placeholder="성공을 어떻게 측정할 것인가 (예: 월별 NPS, 클레임 < 1건)">
      </label>
    </div>
  `;

  const sortedTactics = (p.tactics||[]).slice().sort((a,b) => {
    const wa = a.week||0, wb = b.week||0;
    if (wa !== wb) return wa - wb;
    return 0;
  });
  const weekOpts = (selected) => Array.from({length:13}, (_,i) =>
    `<option value="${i}" ${selected===i?"selected":""}>${i===0?'언제든':`W${i}`}</option>`).join("");

  const tacticsHtml = `
    <div class="card-section">
      <div class="sub-label">
        ⚡ 주간 액션 (Tactics)
        ${tStats ? `<span style="font-weight:400; color:var(--muted);"> · ${tStats.done}/${tStats.total} · ${tStats.pct}%</span>` : ''}
        ${curWk ? `<span style="font-weight:400; color:var(--accent); margin-left:8px;"> · 현재 W${curWk}</span>` : ''}
      </div>
      <ul class="tactics-list">
        ${sortedTactics.length === 0
          ? `<li class="meta" style="border:none;">아직 주간 액션 없음. 12주 동안 매주 할 일을 입력하세요.</li>`
          : sortedTactics.map(t => {
              const isCurrent = curWk !== null && t.week === curWk;
              return `<li data-tid="${t.id}" class="tactic-item ${t.done ? 'done' : ''} ${isCurrent ? 'current' : ''}">
                <input type="checkbox" data-act="cx-tac-done" ${t.done ? 'checked' : ''}>
                <select data-act="cx-tac-week" class="tac-week">${weekOpts(t.week||0)}</select>
                <span class="tac-text" data-act="cx-tac-text" contenteditable="true" spellcheck="false">${escapeHtml(t.text||"")}</span>
                <button class="del-mini" data-act="cx-tac-del">✕</button>
              </li>`;
            }).join("")}
      </ul>
      <div class="modal-add-learning">
        <select data-act="cx-tac-new-week">${weekOpts(curWk||1)}</select>
        <input type="text" data-act="cx-tac-new-text" placeholder="새 주간 액션 (Enter — 이번 주에 할 일·실험)">
        <button class="add-btn" data-act="cx-tac-add" style="margin-top:0;">+ 추가</button>
      </div>
    </div>
  `;

  return `
    <div class="card-section-row">
      <label class="modal-meta-field"><span>상태</span>
        <select data-act="cx-status">${statusOpts}</select></label>
      <div class="modal-date-group">
        <label class="modal-meta-field"><span>📅 시작</span>
          <input type="date" data-act="cx-start" value="${p.start_date||''}"></label>
        <label class="modal-meta-field"><span>📅 종료</span>
          <input type="date" data-act="cx-end" value="${p.end_date||''}"></label>
        <button class="add-btn" data-act="cx-end-12w" style="margin-top:0; font-size:11px; padding:4px 10px;" title="시작일+12주(84일)로 종료일 설정">+12주</button>
      </div>
      ${p.created ? `<span class="meta" style="font-size:11px;">생성 ${p.created}</span>` : ''}
      <button class="del-btn" data-act="cx-del-proj" style="margin-left:auto; font-size:11px;">🗑 프로젝트 삭제</button>
    </div>
    ${goalMetricHtml}
    ${tacticsHtml}
    <div class="card-section">
      <div class="sub-label">💡 모든 인사이트 정리 <span style="font-weight:400; color:var(--muted);">(${(p.learnings||[]).length})</span></div>
      ${learningsHtml}
    </div>
    <div class="card-section">
      <div class="sub-label">🤝 Support (전체 면담) <span style="font-weight:400; color:var(--muted);">(${allSupports.length})</span></div>
      ${supsHtml}
    </div>
    <div class="card-section">
      <div class="sub-label">🗓️ 다뤄진 면담 <span style="font-weight:400; color:var(--muted);">(${touchingMeetings.length})</span></div>
      ${meetingsHtml}
    </div>
  `;
}

function countSupportsForProject(doc, pid) {
  let n = 0;
  getNotes(doc).forEach(m => (m.support||[]).forEach(s => { if (s.project_id === pid) n++; }));
  return n;
}

function setupModal() {
  if (document.getElementById("modal")) return;
  const div = document.createElement("div");
  div.id = "modal";
  div.className = "modal-bg";
  div.hidden = true;
  div.innerHTML = `
    <div class="modal-content">
      <button class="modal-close">✕</button>
      <h2 class="modal-title" id="modalTitle"></h2>
      <div class="modal-meta" id="modalMeta"></div>
      <div id="modalBody"></div>

  document.body.appendChild(div);

            <input type="checkbox" data-act="mmt-done" ${m.done?"checked":""}> 완료
          </label>
          <span style="flex:1; color:var(--muted); font-size:11px;">${workHasContent(m)?"Work 작성됨":""}${careerHasContent(m)?" · Career 작성됨":""}</span>
          <button class="add-btn" data-act="mmt-goto" style="margin-top:0; font-size:11px; padding:4px 10px;">↗ 이 면담으로</button>
        </li>`;
      }).join("")}</ul>`;

  const $m = document.getElementById("modal");
  // 제목: 편집 모드에서는 contenteditable
  document.getElementById("modalTitle").innerHTML = READONLY
    ? escapeHtml(p.name || "(이름 없음)")
    : `<span id="modalNameEdit" data-act="modal-name" contenteditable="true" spellcheck="false" title="클릭해서 이름 수정">${escapeHtml(p.name || "(이름 없음)")}</span>`;

  // 편집 모드: pill 대신 셀렉트로 표시 → 모달에서 바로 상태·우선순위·Mood 변경
  const statusOpts = ["Inbox","In Progress","Done"].map(v =>
    `<option value="${v}" ${p.status===v?"selected":""}>${v}</option>`).join("");
  const prioOpts   = ["High","Mid","Low"].map(v =>
    `<option value="${v}" ${p.priority===v?"selected":""}>${v}</option>`).join("");
  const moodOpts   = [["","Mood —"],["😎","😎 좋음"],["😀","😀 보통"],["😇","😇 어려움"]].map(([v,t]) =>
    `<option value="${v}" ${p.mood===v?"selected":""}>${t}</option>`).join("");

  const metaEditable = `
    <label class="modal-meta-field"><span>상태</span>
      <select id="modalStatus">${statusOpts}</select></label>
    <label class="modal-meta-field"><span>우선순위</span>
      <select id="modalPriority">${prioOpts}</select></label>
    <label class="modal-meta-field"><span>Mood</span>
      <select id="modalMood">${moodOpts}</select></label>
    <div class="modal-date-group">
      <label class="modal-meta-field"><span>📅 시작</span>
        <input type="date" id="modalStart" value="${p.start_date||''}"></label>
      <label class="modal-meta-field"><span>📅 종료</span>
        <input type="date" id="modalEnd" value="${p.end_date||''}"></label>
      <button id="modalEnd12w" class="add-btn" style="margin-top:0; font-size:11px; padding:4px 10px;" title="시작일+12주(84일)로 종료일 설정">+12주</button>
    </div>
  `;
  const metaReadonly = `
    <span class="pill ${statusPillClass(p.status)}">${p.status}</span>
    <span class="pill ${(p.priority||"mid").toLowerCase()}">${p.priority||"Mid"}</span>
    ${p.mood ? `<span>${p.mood}</span>` : ''}
  `;
  document.getElementById("modalMeta").innerHTML = `
    ${READONLY ? metaReadonly : metaEditable}
    ${p.created ? `<span>· 생성 ${p.created}</span>` : ''}
    <span>· 인사이트 ${(p.learnings||[]).length} · Support ${allSupports.length} · 면담 ${touchingMeetings.length}회</span>
    ${READONLY ? '' : `<button class="del-btn" data-pid="${p.id}" id="modalDeleteBtn" style="margin-left:auto;">🗑 프로젝트 삭제</button>`}
  `;
  document.getElementById("modalBody").innerHTML = `
    <div class="modal-section">
      <h3>💡 모든 인사이트 정리</h3>
      ${learningsHtml}
    </div>
    <div class="modal-section">
      <h3>🤝 이 프로젝트에 걸린 Support (전체 면담)</h3>
      ${supsHtml}
    </div>
    <div class="modal-section">
      <h3>🗓️ 다뤄진 면담</h3>
      ${meetingsHtml}
    </div>
  `;
  if (!READONLY) {
    // 상태·우선순위·Mood 셀렉트 — 변경 즉시 저장 + 보드 + 토픽 칩 갱신
    const $st = document.getElementById("modalStatus");
    const $pr = document.getElementById("modalPriority");
    const $md = document.getElementById("modalMood");
    if ($st) $st.addEventListener("change", () => {
      p.status = $st.value; markDirty();
      renderBoard(doc);
      const m = currentMeeting(doc);
      if (m) {
        const $tp = document.getElementById(`topicPicker-${doc}`);
        if ($tp) { $tp.innerHTML = renderTopicPicker(doc, m); wireTopicPicker(doc); }
        const $tc = document.getElementById(`topicCards-${doc}`);
        if ($tc && m.topic_projects.includes(pid)) { $tc.innerHTML = renderTopicCards(doc, m); wireTopicCards(doc); }
      }
    });
    if ($pr) $pr.addEventListener("change", () => {
      p.priority = $pr.value; markDirty();
      renderBoard(doc);
      const m = currentMeeting(doc);
      if (m && m.topic_projects.includes(pid)) {
        const $tc = document.getElementById(`topicCards-${doc}`);
        if ($tc) { $tc.innerHTML = renderTopicCards(doc, m); wireTopicCards(doc); }
      }
    });
    if ($md) $md.addEventListener("change", () => {
      p.mood = $md.value; markDirty();
      renderBoard(doc);
      const m = currentMeeting(doc);
      if (m && m.topic_projects.includes(pid)) {
        const $tc = document.getElementById(`topicCards-${doc}`);
        if ($tc) { $tc.innerHTML = renderTopicCards(doc, m); wireTopicCards(doc); }
      }
    });

    // 시작일·종료일·+12주 (모달)
    const $mStart   = document.getElementById("modalStart");
    const $mEnd     = document.getElementById("modalEnd");
    const $mEnd12w  = document.getElementById("modalEnd12w");
    const refreshModalShallow = () => openProjectModal(doc, pid);
    if ($mStart) $mStart.addEventListener("change", () => { p.start_date = $mStart.value; markDirty(); renderBoard(doc); });
    if ($mEnd)   $mEnd.addEventListener("change",   () => { p.end_date   = $mEnd.value;   markDirty(); renderBoard(doc); });
    if ($mEnd12w) $mEnd12w.addEventListener("click", () => {
      if (!p.start_date) { alert("먼저 시작일을 설정하세요."); return; }
      p.end_date = addDays(p.start_date, 84);
      markDirty(); renderBoard(doc); refreshModalShallow();
    });

    // ── 인사이트 정리: 모달에서 추가·수정·삭제 ──
    const refreshModal = () => openProjectModal(doc, pid);
    const $list = document.getElementById("modalLearnings");
    if ($list) {
      $list.querySelectorAll("li[data-idx]").forEach(li => {
        const i = parseInt(li.dataset.idx);
        const target = p.learnings[i];
        if (!target) return;
        const $date = li.querySelector("[data-act=edit-date]");
        const $text = li.querySelector("[data-act=edit-text]");
        const $del  = li.querySelector("[data-act=del]");
        if ($date) $date.addEventListener("change", () => {
          target.date = $date.value; markDirty(); renderBoard(doc);
        });
        if ($text) {
          const commitText = () => {
            const v = $text.innerText.trim();
            if (v !== (target.text||"")) { target.text = v; markDirty(); renderBoard(doc); }
          };
          $text.addEventListener("blur", commitText);
          $text.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); $text.blur(); }
            if (e.key === "Escape") { $text.innerText = target.text||""; $text.blur(); }
          });
        }
        if ($del) $del.addEventListener("click", () => {
          if (!confirm("이 인사이트 정리를 삭제할까요?")) return;
          p.learnings.splice(i, 1);
          markDirty(); renderBoard(doc); refreshModal();
        });
      });
    }
    const $newText = document.getElementById("modalNewLearningText");
    const $newDate = document.getElementById("modalNewLearningDate");
    const $addBtn  = document.getElementById("modalAddLearningBtn");
    const addNew = () => {
      const v = ($newText?.value || "").trim();
      if (!v) return;
      const date = $newDate?.value || todayStr();
      p.learnings.push({ date, text: v, meeting_id: null });
      markDirty(); renderBoard(doc); refreshModal();
    };
    if ($addBtn)  $addBtn.addEventListener("click", addNew);
    if ($newText) $newText.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); addNew(); }
    });

    // ── 제목 인라인 편집 ──
    const $name = document.getElementById("modalNameEdit");
    if ($name) {
      const commitName = () => {
        const v = $name.innerText.trim();
        if (v && v !== (p.name||"")) { p.name = v; markDirty(); renderBoard(doc); renderMeeting(doc); }
      };
      $name.addEventListener("blur", commitName);
      $name.addEventListener("keydown", e => {
        if (e.key === "Enter") { e.preventDefault(); $name.blur(); }
        if (e.key === "Escape") { $name.innerText = p.name||""; $name.blur(); }
      });
    }

    // ── Support 섹션 인라인 편집 ──
    const $sups = document.getElementById("modalSupports");
    if ($sups) {
      $sups.querySelectorAll("li[data-sid]").forEach(li => {
        const sid = li.dataset.sid;
        const mid = li.dataset.mid;
        const meeting = notes.find(n => n.id === mid);
        const s = meeting?.support?.find(x => x.id === sid);
        if (!s) return;
        const $rev  = li.querySelector("[data-act=msup-rev]");
        const $type = li.querySelector("[data-act=msup-type]");
        const $need = li.querySelector("[data-act=msup-need]");
        const $del  = li.querySelector("[data-act=msup-del]");
        if ($rev)  $rev.addEventListener("change",  () => { s.reviewed = $rev.checked; markDirty(); });
        if ($type) $type.addEventListener("change", () => { s.type     = $type.value;   markDirty(); });
        if ($need) $need.addEventListener("input",  () => { s.need     = $need.value;   markDirty(); });
        if ($del)  $del.addEventListener("click",   () => {
          if (!confirm("이 Support 를 삭제할까요?")) return;
          meeting.support = (meeting.support||[]).filter(x => x.id !== sid);
          markDirty(); renderBoard(doc); renderMeeting(doc); refreshModal();
        });
      });
    }
    // Support 추가 — 현재 진행 중 면담에 묶음
    const $newSupType = document.getElementById("modalNewSupType");
    const $newSupNeed = document.getElementById("modalNewSupNeed");
    const $addSupBtn  = document.getElementById("modalAddSupBtn");
    const addSup = () => {
      const v = ($newSupNeed?.value || "").trim();
      if (!v) return;
      const meeting = currentMeeting(doc);
      if (!meeting) { alert("면담이 없어 Support 를 추가할 수 없습니다. 먼저 '+ 새 면담' 으로 회차를 만드세요."); return; }
      meeting.support = meeting.support || [];
      meeting.support.push({ id:"s_"+Math.random().toString(16).slice(2,10),
        type: $newSupType?.value || "Help", need: v, reviewed:false, project_id: pid });
      markDirty(); renderBoard(doc); renderMeeting(doc); refreshModal();
    };
    if ($addSupBtn)  $addSupBtn.addEventListener("click", addSup);
    if ($newSupNeed) $newSupNeed.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); addSup(); }
    });

    // ── 다뤄진 면담: 무드·완료·날짜 인라인 편집 + 이동 ──
    const $mlist = document.getElementById("modalMeetings");
    if ($mlist) {
      $mlist.querySelectorAll("li[data-mid]").forEach(li => {
        const mid = li.dataset.mid;
        const meeting = notes.find(n => n.id === mid);
        if (!meeting) return;
        const $date = li.querySelector("[data-act=mmt-date]");
        const $mood = li.querySelector("[data-act=mmt-mood]");
        const $done = li.querySelector("[data-act=mmt-done]");
        const $go   = li.querySelector("[data-act=mmt-goto]");
        if ($date) $date.addEventListener("change", () => { meeting.date = $date.value; meeting.month = ($date.value||"").slice(0,7); markDirty(); renderMeeting(doc); });
        if ($mood) $mood.addEventListener("change", () => { meeting.mood = $mood.value; markDirty(); renderMeeting(doc); });
        if ($done) $done.addEventListener("change", () => { meeting.done = $done.checked; markDirty(); renderMeeting(doc); });
        if ($go)   $go.addEventListener("click", () => {
          const i = notes.findIndex(n => n.id === mid);
          if (i >= 0) { currentIdx[doc] = i; renderMeeting(doc); renderFollowup(doc); renderHistory(doc); }
          closeModal();
          window.scrollTo({ top: document.getElementById(`meeting-${doc}`).offsetTop - 20, behavior: "smooth" });
        });
      });
    }

    const delBtn = document.getElementById("modalDeleteBtn");
    if (delBtn) delBtn.addEventListener("click", () => {
      if (!confirm(`프로젝트 "${p.name}" 를 삭제할까요? 관련 인사이트·Support 도 함께 삭제됩니다.`)) return;
      const arr = getProjects(doc);
      const i = arr.findIndex(x => x.id === pid);
      if (i >= 0) arr.splice(i, 1);
      // 면담에서 reference 제거
      notes.forEach(m => {
        if (m.topic_projects) m.topic_projects = m.topic_projects.filter(x => x !== pid);
        if (m.support) m.support.forEach(s => { if (s.project_id === pid) s.project_id = null; });
      });
      markDirty();
      closeModal();
      renderBoard(doc); renderMeeting(doc);
    });
  }
  $m.hidden = false;
}

// ───── Section D: Follow-up ─────
function renderFollowup(doc) {
  const notes = getNotes(doc);
  const $sec = document.getElementById(`followup-${doc}`);
  const idx = currentIdx[doc] ?? (notes.length-1);
  const prev = idx > 0 ? notes[idx-1] : null;
  const items = [];
  if (prev) {
    (prev.support||[]).forEach(s => {
      if (!s.reviewed) items.push({s, meeting: prev});
    });
  }
  $sec.innerHTML = `
    <h2>↩️ 지난 면담 Follow-up <span class="badge">직전 1회 미해결</span></h2>
    ${items.length === 0
      ? `<div class="meta" style="padding:8px;">지난 면담 메모가 없거나 모두 완료됨.</div>`
      : `<ul class="item-list">${items.map(({s, meeting}) => {
          const p = s.project_id ? getProject(doc, s.project_id) : null;
          return `<li>
            ${READONLY
              ? `${s.reviewed?"✅":"⬜"}`
              : `<input type="checkbox" data-act="fu-rev" data-mid="${meeting.id}" data-sid="${s.id}">`}
            <span class="meta" style="min-width:90px;">${meeting.date} · ${supLabel(s.type)||"-"}</span>
            ${p ? `<span class="pill" style="background:var(--panel3); color:var(--accent);">📌 ${escapeHtml(p.name||"")}</span>` : ''}
            <span style="flex:1;">${escapeHtml(s.need || "(내용 없음)")}</span>
          </li>`;
        }).join("")}</ul>`}
  `;
  if (!READONLY) {
    $sec.querySelectorAll("[data-act=fu-rev]").forEach(el => {
      el.addEventListener("change", () => {
        const mid = el.dataset.mid;
        const sid = el.dataset.sid;
        const note = notes.find(n => n.id === mid);
        if (note) {
          const sup = (note.support||[]).find(s => s.id === sid);
          if (sup) sup.reviewed = el.checked;
        }
        markDirty(); renderFollowup(doc);
      });
    });
  }
}

// ───── Section E: 과거 면담 기록 ─────
function renderHistory(doc) {
  const notes = getNotes(doc);
  const idx = currentIdx[doc] ?? (notes.length-1);
  const past = notes.slice(0, idx).reverse();
  const $sec = document.getElementById(`history-${doc}`);
  $sec.innerHTML = `
    <h2>📚 과거 면담 기록 <span class="badge">${past.length}회</span></h2>
    ${past.length === 0
      ? `<div class="meta">아직 과거 면담 기록 없음.</div>`
      : past.map(n => {
          const topics = (n.topic_projects||[]).map(pid => {
            const p = getProject(doc, pid);
            return p ? `<span class="topic-tag">${escapeHtml(p.name)}</span>` : '';
          }).join("");
          const supList = (n.support||[]).map(s => {
            const p = s.project_id ? getProject(doc, s.project_id) : null;
            return `&nbsp;&nbsp;[${s.reviewed?"✅":"⬜"} ${s.type}] ${p?`<i style="color:var(--accent);">📌${escapeHtml(p.name||"")}</i> · `:""}${escapeHtml(s.need||"")}`;
          }).join("<br>") || "(없음)";
          return `<details>
            <summary>
              <strong>${n.date}</strong> ${n.done?"✅":"📝"} ${n.mood||""}
              <span class="topic-tags">${topics}</span>
              &nbsp;<span class="meta">(work ${workCharCount(n)}자 · career ${careerCharCount(n)}자 · support ${(n.support||[]).length}건)</span>
            </summary>
            <div class="body">
              <span class="heading">💼 Work — ✅ 잘된 것</span>
              <p>${escapeHtml(n.work?.good||"(없음)")}</p>
              <span class="heading">💼 Work — 🔶 어려웠던 것</span>
              <p>${escapeHtml(n.work?.hard||"(없음)")}</p>
              <span class="heading">💼 Work — 📌 다음 달 시도</span>
              <p>${escapeHtml(n.work?.next||"(없음)")}</p>
              <span class="heading">🌱 Career — 📚 학습·관찰</span>
              <p>${escapeHtml(n.career?.learn||"(없음)")}</p>
              <span class="heading">🌱 Career — 🎯 다음 달 성장 시도</span>
              <p>${escapeHtml(n.career?.grow||"(없음)")}</p>
              <span class="heading">🌱 Career — 🔭 중장기 방향</span>
              <p>${escapeHtml(n.career?.direction||"(없음)")}</p>
              <span class="heading">🤝 Support</span>
              <p>${supList}</p>
            </div>
          </details>`;
        }).join("")}
  `;
}


const ENC_URL = "1on1.enc.json";
let ENC_BLOB = null;
const $lock = document.getElementById("lock");
const $err  = document.getElementById("lockErr");
const $pw   = document.getElementById("pw");
const $app  = document.getElementById("app");

document.getElementById("unlockBtn").addEventListener("click", unlock);
$pw.addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });

async function fetchBlob() {
  if (ENC_BLOB) return ENC_BLOB;
  const res = await fetch(ENC_URL + "?_=" + Date.now(), {cache:"no-store"});
  if (!res.ok) throw new Error(`enc 다운로드 실패: ${res.status}`);
  ENC_BLOB = await res.json();
  return ENC_BLOB;
}
async function deriveKey(pw, salt, iter) {
  const enc = new TextEncoder();
  const km = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations:iter, hash:"SHA-256" },
    km, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
}
function b64(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

async function unlock() {
  $err.textContent = "";
  const pw = $pw.value;
  if (!pw) { $err.textContent = "비밀번호를 입력하세요."; return; }
  try {
    const blob = await fetchBlob();
    const key  = await deriveKey(pw, b64(blob.salt), blob.iterations);
    const ptBuf = await crypto.subtle.decrypt({name:"AES-GCM", iv: b64(blob.iv)}, key, b64(blob.data));
    const payload = JSON.parse(new TextDecoder().decode(ptBuf));
    document.getElementById("genTime").textContent = blob.generated + " 생성";
    $lock.style.display = "none";
    $app.style.display  = "block";
    boot(payload);
  } catch (e) {
    console.warn(e);
    $err.textContent = "비밀번호가 틀렸거나 데이터를 가져오지 못했습니다.";
    $pw.select();
  }
}
</script>
